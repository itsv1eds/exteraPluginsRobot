name: "Bug report"
description: Report a reproducible problem in the bot, catalog flow, moderation, or Joinly settings.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please fill in the details below so the problem can be reproduced and fixed faster.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue clearly and include the affected command, screen, or flow.
      placeholder: The bot crashes after I upload a .plugin file in the moderation flow.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the bug.
      placeholder: |
        1. Open ...
        2. Send ...
        3. Press ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The bot should accept the file and create a moderation entry.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead, the bot rejects the file and logs a traceback.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, traceback, or screenshots
      description: Paste any useful logs or attach screenshots if available.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched for existing issues before opening this report.
          required: true
        - label: I can reproduce this issue consistently.
          required: false
